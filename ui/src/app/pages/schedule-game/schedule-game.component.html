<div class="container" *ngIf="game">
    <button mat-icon-button (click)="goBack()" class="back-button">
        <mat-icon>arrow_back</mat-icon>
    </button>

    <div class="game-date">{{ game.date | date: 'dd/MM/yyyy HH:mm' }}</div>

    <mat-card class="game-card">
        <mat-card-content>
            <div class="scoreboard">
                <span class="team">{{ homeTeamName }}</span>
                <div class="score-block">
                    <span class="score">{{ homeScore }} - {{ awayScore }}</span>
                    <span class="status" [class.live]="status === 'playing'">{{ status }}</span>
                </div>
                <span class="team away">{{ awayTeamName }}</span>
            </div>
        </mat-card-content>
    </mat-card>
</div>
