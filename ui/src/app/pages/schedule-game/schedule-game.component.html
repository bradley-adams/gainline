<div *ngIf="game">
    <h1>{{ game.date | date: 'dd/MM/yyyy HH:mm' }}</h1>

    <mat-card>
        <mat-card-content>
            <div class="scoreboard">
                <span class="team">{{ homeTeamName }}</span>
                <span class="score">{{ homeScore }} - {{ awayScore }}</span>
                <span class="team">{{ awayTeamName }}</span>
            </div>
            <div class="status">{{ status }}</div>
        </mat-card-content>
    </mat-card>
</div>
